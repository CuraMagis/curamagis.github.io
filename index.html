<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>CuraMagis — Boutique College Admissions Counseling</title>
<link rel="icon" href="assets/icon-compass-navybg.png">
<link rel="stylesheet" href="colors_and_type.css">
<style>
  * { box-sizing: border-box; }
  html, body { margin: 0; background: var(--paper); }
  body { font-family: var(--font-body); -webkit-font-smoothing: antialiased; }
  a { color: inherit; }
  @keyframes cmFade { from { opacity: 0; } to { opacity: 1; } }
  @keyframes cmRise { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }
  .cm-menu-btn { display: none !important; }
  @media (max-width: 860px) {
    .cm-desktop-nav { display: none !important; }
    .cm-menu-btn { display: block !important; }
    .cm-grid-3, .cm-grid-2 { grid-template-columns: 1fr !important; }
    .cm-foot-grid { grid-template-columns: 1fr 1fr !important; }
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Primitives.jsx"></script>
<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Hero.jsx"></script>
<script type="text/babel" src="Sections.jsx"></script>
<script type="text/babel" src="ContactDialog.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel" src="App.jsx"></script>

<script>
  (function () {
    var tries = 0;
    function go() {
      if (window.React && window.ReactDOM && typeof window.CuraApp === "function") {
        ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(window.CuraApp));
        return;
      }
      if (tries++ < 400) setTimeout(go, 25);
    }
    go();
  })();
</script>
</body>
</html>
